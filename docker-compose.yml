version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pest-recognition-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=production
    volumes:
      - ./insect_info.json:/app/insect_info.json:ro
      - ./data.yaml:/app/data.yaml:ro
      - model_cache:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - pest-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pest-recognition-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - pest-network

  # Optional: Redis for caching (nếu cần)
  redis:
    image: redis:7-alpine
    container_name: pest-recognition-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - pest-network

volumes:
  model_cache:
    driver: local
  redis_data:
    driver: local

networks:
  pest-network:
    driver: bridge
